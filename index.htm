            let cumulative = 0;
            return (

                        <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="#F7F3ED" strokeWidth={thickness} />

                            const value = (d.amount / total) * circumference;
                            const dasharray = `${value} ${circumference - value}`;
                            const dashoffset = -cumulative;

                            return (
                                <circle
                                    key={d.key}
                                    cx={size / 2}
                                    cy={size / 2}
                                    r={radius}
                                    fill="none"
                                    stroke={d.color}

                            key={s.key}
                            onClick={() => onSelect(s.key)}
                            className={`w-full text-left rounded-2xl p-4 transition-all ${isSelected ? 'bg-apple-card ring-2 ring-apple-blue' : 'bg-white hover:bg-apple-card/60'}`}
                        >
                            <div className="flex items-center justify-between mb-2 text-sm">
                                <span className="font-semibold text-apple-text">{s.label} ({s.shortLabel})</span>
                                <span className="text-apple-secondary">รายรับ {formatBaht(s.income)} บาท/ปี</span>
                            </div>
                            <div className="relative">
                                <div
                                    className="flex h-9 rounded-full overflow-hidden shadow-sm"
                                    style={{ width: `${(s.income / maxScale) * 100}%` }}
                                >
                                    {budgetCategories.map((c) => (
                                        <div
                                            key={c.key}
                                            style={{ width: `${(c.amount / s.income) * 100}%`, backgroundColor: c.color }}
                                            title={`${c.label}: ${formatBaht(c.amount)} บาท`}
                                        ></div>
                                    ))}
                                    <div
                                        style={{ width: `${(remaining / s.income) * 100}%`, backgroundColor: remainingColor }}
                                        title={`เงินคงเหลือที่ใช้ได้: ${formatBaht(remaining)} บาท`}
                                    ></div>
                                </div>
                            </div>
                        </button>
                    );
                })}
                {/* Axis */}
                <div className="relative h-5 mt-2">
                    {axisTicks.map((t) => (
                        <span
                            key={t}
                            className="absolute text-[11px] text-apple-secondary -translate-x-1/2"
                            style={{ left: `${(t / maxScale) * 100}%` }}
                        >
                            {t === 0 ? '0' : (t / 1000000) + 'ล.'}
                        </span>
                    ))}
                </div>
            </div>
        );

        // ---------- "ค่าใช้จ่ายประจำปี อื่นๆ" breakdown ----------
        const OtherExpenseBreakdown = ({ item }) => (
            <div className="rounded-[28px] p-8 md:p-10 bg-apple-card">
                <div className="flex items-center gap-3 mb-2">
                    <span className="w-3.5 h-3.5 rounded-full shrink-0" style={{ backgroundColor: item.color }}></span>
                    <h3 className="typography-h3">{item.label}</h3>
                </div>
                <p className="text-sm text-apple-secondary mb-6">
                    รวม {formatBaht(item.amount)} บาท/ปี — คิดเป็น {formatPct(item.amount / totalExpense)} ของค่าใช้จ่ายรวมทั้งหมด
                </p>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {item.breakdown.map((b) => (
                        <div key={b.label} className="bg-white rounded-2xl p-5 flex items-center gap-3">
                            <div className="w-9 h-9 rounded-full bg-apple-card flex items-center justify-center shrink-0 text-apple-text">
                                <Icon name={b.icon} className="w-5 h-5" />
                            </div>
                            <p className="text-sm font-medium text-apple-text">{b.label}</p>
                        </div>
                    ))}
                </div>
                <p className="text-xs text-apple-secondary mt-6">
                    * รายการข้างต้นเป็นรายการค่าใช้จ่ายประจำปีอื่นๆ ภายใต้ยอดรวม {formatBaht(item.amount)} บาท/ปี อ้างอิงจากไฟล์งบประมาณที่แนบ
                    ตัวเลขค่าใช้จ่ายจริงของแต่ละรายการจะแจ้งให้ทราบเมื่อได้รับใบเสนอราคาในแต่ละปี
                </p>
            </div>
        );

        // ---------- Summary cards for selected scenario ----------
        const SummaryCards = ({ scenario }) => {
            const remaining = scenario.income - totalExpense;
            const cards = [
                { label: 'รายรับรวม (' + scenario.shortLabel + ')', value: scenario.income, color: '#926AA8' },
                { label: 'ค่าใช้จ่ายรวมทั้งหมด', value: totalExpense, color: '#DC3853' },
                { label: 'เงินคงเหลือที่ใช้ได้', value: remaining, color: '#728F71' }
            ];
            return (
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    {cards.map((c) => (
                        <div key={c.label} className="bg-white border border-apple-divider rounded-2xl p-6">
                            <p className="text-sm text-apple-secondary mb-2">{c.label}</p>
                            <p className="text-2xl font-semibold" style={{ color: c.color }}>{formatBaht(c.value)}</p>
                            <p className="text-xs text-apple-secondary mt-1">บาท/ปี</p>
                        </div>
                    ))}
                </div>
            );
        };

        // Budget Section (dynamic dashboard)
        const BudgetSection = () => {
            const [selected, setSelected] = useState('full');
            const selectedScenario = scenarios.find((s) => s.key === selected);
            const otherItem = budgetCategories.find((c) => c.key === 'annualOther');

            return (
                <section id="budget" className="py-24 bg-white border-b border-apple-divider">
                    <div className="max-w-[1024px] mx-auto px-6">
                        <div className="text-center mb-16">
                            <div className="w-14 h-14 rounded-full bg-apple-card flex items-center justify-center mx-auto mb-5 text-apple-blue">
                                <Icon name="coins" className="w-7 h-7" />
                            </div>
                            <h2 className="typography-h2 mb-4">งบประมาณบริหาร หมู่บ้าน สีวลี</h2>
                            <p className="typography-body text-apple-secondary max-w-2xl mx-auto">
                                สัดส่วนค่าใช้จ่ายหลักในการบริหารต่อปี และการเปรียบเทียบ 3 สถานการณ์การจัดเก็บค่าส่วนกลาง เพื่อความโปร่งใสในการบริหารงบประมาณ
                            </p>
                        </div>

                        {/* Donut + legend */}
                        <div className="grid md:grid-cols-2 gap-10 items-center mb-8">
                            <DonutChart data={budgetCategories} total={totalExpense} />
                            <BudgetLegend data={budgetCategories} total={totalExpense} />
                        </div>
                        <p className="text-xs text-apple-secondary text-center mb-16">
                            ยังไม่รวมค่าใช้จ่ายที่เป็นการบำรุงรักษาส่วนกลางกรณีพิเศษ ตัวเลขค่าน้ำและค่าไฟฟ้าเป็นค่าเฉลี่ยจากสถิติในอดีต อาจปรับเปลี่ยนได้ตามการใช้งานจริง
                        </p>

                        {/* Other expense breakdown */}
                        <div className="mb-16">
                            <OtherExpenseBreakdown item={otherItem} />
                        </div>

                        {/* Scenario comparison */}
                        <div className="grid md:grid-cols-3 gap-10">
                            <div className="md:col-span-2">
                                <h3 className="typography-h3 mb-1">รายรับเทียบกับค่าใช้จ่าย และเงินคงเหลือ</h3>
                                <p className="text-sm text-apple-secondary mb-6">แตะแถบเพื่อเลือกดูสถานการณ์การจัดเก็บค่าส่วนกลาง</p>
                                <ScenarioBars selected={selected} onSelect={setSelected} />
                            </div>
                            <div className="bg-[#F9E199]/40 rounded-[28px] p-8">
                                <h4 className="font-semibold text-apple-text mb-3">ภาพรวมค่าใช้จ่ายทั้งหมด ต่อปี</h4>
                                <p className="text-sm text-apple-secondary mb-4">เปรียบเทียบ 3 สถานการณ์การจัดเก็บค่าส่วนกลาง:</p>
                                <ul className="text-sm text-apple-secondary space-y-2 list-disc list-inside">
                                    <li>รายรับเต็มจำนวน (100%)</li>
                                    <li>จัดเก็บได้ 95%</li>
                                    <li>จัดเก็บได้ 90%</li>
                                </ul>
                                <p className="text-sm text-apple-secondary mt-4">
                                    รวมค่าใช้จ่ายแยกตามหมวด เปรียบเทียบกับยอดเงินที่ใช้ได้ (สีเขียว) ในแต่ละสถานการณ์การจัดเก็บ
                                </p>
                            </div>
                        </div>

                        {/* Summary cards for the selected scenario */}
                        <div className="mt-10">
                            <SummaryCards scenario={selectedScenario} />
                        </div>
                    </div>
                </section>
            );
        };

        // ---------- Pie chart (2 slices, clickable + hoverable) ----------
        const PieChart = ({ onSliceClick, onSliceHover, hovered }) => {
            const size = 260;
            const cx = size / 2, cy = size / 2, r = size / 2 - 6;
            const paidRatio = paidHouses.length / paymentTotal;
            const paidAngle = paidRatio * 360;

            function polarToCartesian(angleDeg) {
                const a = ((angleDeg - 90) * Math.PI) / 180;
                return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
            }
            function arcPath(startAngle, endAngle) {
                const [x1, y1] = polarToCartesian(startAngle);
                const [x2, y2] = polarToCartesian(endAngle);
                const largeArc = endAngle - startAngle > 180 ? 1 : 0;
                return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
            }

            const slices = [
                { key: 'จ่ายแล้ว', start: 0, end: paidAngle, color: PAID_COLOR, count: paidHouses.length },
                { key: 'ยังไม่ได้จ่าย', start: paidAngle, end: 360, color: UNPAID_COLOR, count: unpaidHouses.length }
            ];

            return (
                <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-[280px] mx-auto h-auto">
                    {slices.map((s) => (
                        <path
                            key={s.key}
                            d={arcPath(s.start, s.end)}
                            fill={s.color}
                            opacity={hovered && hovered !== s.key ? 0.55 : 1}
                            stroke="#fff"
                            strokeWidth="2"
                            className="cursor-pointer transition-opacity"
                            onClick={() => onSliceClick(s.key)}
                            onMouseEnter={() => onSliceHover(s.key)}
                            onMouseLeave={() => onSliceHover(null)}
                        >
                            <title>{`${s.key}: ${s.count} หลัง (${formatPct(s.count / paymentTotal)})`}</title>
                        </path>
                    ))}
                </svg>
            );
        };

        // Payment Status Popup — high-visibility, friendly for elderly users
        const PaymentPopup = ({ result, onClose }) => {
            if (!result) return null;
            const isPaid = result.status === 'จ่ายแล้ว';
            const message = isPaid
                ? 'ขอบคุณที่ชำระค่าส่วนกลาง'
                : 'ท่านยังไม่ได้ชำระค่าส่วนกลาง โปรดชำระภายในวันที่ 31 ก.ค. 2569 หากชำระแล้วให้ติดต่อ นิติ.';
            return (
                <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] px-6" onClick={onClose}>
                    <div
                        className="bg-white rounded-[24px] p-8 max-w-sm w-full text-center shadow-xl border-4"
                        style={{ borderColor: isPaid ? PAID_COLOR : '#F5A623' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div
                            className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5"
                            style={{ backgroundColor: isPaid ? '#E7F6EC' : '#FEF3E2' }}
                        >
                            <Icon
                                name={isPaid ? 'check' : 'alert'}
                                className="w-8 h-8"
                                style={{ color: isPaid ? PAID_COLOR : '#E08E0B' }}
                            />
                        </div>
                        <p className="text-sm text-apple-secondary mb-1">บ้านเลขที่ {result.house}</p>
                        <p className="typography-h3 mb-3">{message}</p>
                        <button
                            onClick={onClose}
                            className="mt-2 bg-apple-blue hover:bg-apple-blueHover text-white px-8 py-3 rounded-full text-base font-medium transition-colors"
                        >
                            ปิด
                        </button>
                    </div>
                </div>
            );
        };

        // In-page house list Drawer (slide-over) — replaces the old "open new tab" behaviour
        const HouseListDrawer = ({ status, onClose }) => {
            const [q, setQ] = useState('');
            const [sortAsc, setSortAsc] = useState(true);
            const [page, setPage] = useState(1);
            const pageSize = 15;

            if (!status) return null;
            const color = status === 'จ่ายแล้ว' ? PAID_COLOR : UNPAID_COLOR;
            const fullList = status === 'จ่ายแล้ว' ? paidHouses : unpaidHouses;

            const filtered = fullList
                .filter((d) => d.house.includes(q.trim()))
                .sort((a, b) => (sortAsc ? 1 : -1) * (houseSortKey(a.house) - houseSortKey(b.house)));

            const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
            const pageRows = filtered.slice((page - 1) * pageSize, page * pageSize);

            return (
                <div className="fixed inset-0 z-[110]">
                    <div className="absolute inset-0 bg-black/40" onClick={onClose}></div>
                    <div className="absolute right-0 top-0 h-full w-full sm:w-[420px] bg-white shadow-2xl flex flex-col animate-[slideIn_0.25s_ease-out]">
                        <div className="p-6 border-b border-apple-divider shrink-0">
                            <div className="flex items-center justify-between mb-1">
                                <h3 className="typography-h3">รายชื่อบ้านเลขที่</h3>
                                <button
                                    onClick={onClose}
                                    aria-label="ปิด"
                                    className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-apple-card shrink-0"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <span
                                className="inline-block px-3 py-1 rounded-full text-xs font-semibold text-white"
                                style={{ backgroundColor: color }}
                            >
                                {status} • ทั้งหมด {fullList.length} หลัง
                            </span>
                        </div>

                        <div className="p-6 pb-3 shrink-0 space-y-3">
                            <input
                                type="text"
                                value={q}
                                onChange={(e) => { setQ(e.target.value); setPage(1); }}
                                placeholder="ค้นหาบ้านเลขที่ เช่น 456/123 หรือ 123"
                                className="w-full border border-apple-divider rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-apple-blue"
                            />
                            <button
                                onClick={() => setSortAsc((v) => !v)}
                                className="flex items-center gap-1.5 text-xs text-apple-secondary hover:text-apple-text"
                            >
                                เรียงตามบ้านเลขที่ {sortAsc ? '(น้อย → มาก)' : '(มาก → น้อย)'}
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v18m13.5-4.5L16.5 21m0 0L12 16.5m4.5 4.5V3" />
                                </svg>
                            </button>
                        </div>

                        <div className="flex-grow overflow-y-auto px-6">
                            {pageRows.length === 0 && (
                                <p className="text-sm text-apple-secondary text-center py-10">ไม่พบบ้านเลขที่ที่ค้นหา</p>
                            )}
                            <div className="divide-y divide-apple-divider">
                                {pageRows.map((h) => (
                                    <div key={h.house} className="py-3 flex items-center justify-between gap-3">
                                        <span className="text-sm font-medium text-apple-text">{h.house}</span>
                                        <span
                                            className="text-xs font-semibold px-2.5 py-0.5 rounded-full text-white shrink-0"
                                            style={{ backgroundColor: color }}
                                        >
                                            {h.status}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-6 pt-4 border-t border-apple-divider shrink-0 flex items-center justify-between text-sm">
                            <span className="text-apple-secondary text-xs">หน้า {page} / {totalPages} ({filtered.length} หลัง)</span>
                            <div className="flex gap-2">
                                <button
                                    onClick={() => setPage((p) => Math.max(1, p - 1))}
                                    disabled={page <= 1}
                                    className="border border-apple-divider rounded-full px-4 py-1.5 text-xs font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-apple-card"
                                >
                                    ‹ ก่อนหน้า
                                </button>
                                <button
                                    onClick={() => setPage((p) => Math.min(totalPages, p + 1))}
                                    disabled={page >= totalPages}
                                    className="border border-apple-divider rounded-full px-4 py-1.5 text-xs font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-apple-card"
                                >
                                    ถัดไป ›
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Payment Status Section
        const PaymentStatusSection = () => {
            const [query, setQuery] = useState('');
            const [searchResult, setSearchResult] = useState(undefined); // undefined = no search yet, null = not found, obj = found
            const [popupResult, setPopupResult] = useState(null);
            const [hovered, setHovered] = useState(null);
            const [drawerStatus, setDrawerStatus] = useState(null);

            const paidPct = paidHouses.length / paymentTotal;
            const unpaidPct = unpaidHouses.length / paymentTotal;

            const handleSearch = () => {
                const found = findHouse(query);
                setSearchResult(found);
            };

            const summaryCards = [
                { label: 'บ้านทั้งหมด', value: paymentTotal + ' หลัง', color: '#926AA8' },
                { label: 'จ่ายแล้ว', value: paidHouses.length + ' หลัง', color: PAID_COLOR },
                { label: 'ยังไม่จ่าย', value: unpaidHouses.length + ' หลัง', color: UNPAID_COLOR },
                { label: 'อัตราการชำระ', value: formatPct(paymentRate), color: '#926AA8' }
            ];

            return (
                <section id="payment-status" className="py-24 bg-white border-b border-apple-divider">
                    <div className="max-w-[1024px] mx-auto px-6">
                        <div className="text-center mb-14">
                            <div className="w-14 h-14 rounded-full bg-apple-card flex items-center justify-center mx-auto mb-5 text-apple-blue">
                                <Icon name="pie" className="w-7 h-7" />
                            </div>
                            <h2 className="typography-h2 mb-4">สถานการณ์การชำระค่าส่วนกลาง</h2>
                            <p className="typography-body text-apple-secondary max-w-2xl mx-auto">
                                ตรวจสอบสถานะ การชำระค่าส่วนกลางของบ้านท่าน หรือดูภาพรวมทั้งหมู่บ้าน
                            </p>
                        </div>

                        {/* Search box */}
                        <div className="max-w-xl mx-auto mb-14">
                            <div className="flex flex-col sm:flex-row gap-3">
                                <input
                                    type="text"
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleSearch(); }}
                                    placeholder="ค้นหาบ้านเลขที่ เช่น 456/123 หรือ 123"
                                    className="flex-grow border border-apple-divider rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-apple-blue"
                                />
                                <button
                                    onClick={handleSearch}
                                    className="bg-apple-blue hover:bg-apple-blueHover text-white px-6 py-3 rounded-full text-sm font-medium transition-colors shrink-0"
                                >
                                    ค้นหา
                                </button>
                            </div>

                            {/* Search result */}
                            {searchResult === null && (
                                <div className="mt-4 bg-apple-card rounded-2xl p-5 text-sm text-apple-secondary text-center">
                                    ไม่พบบ้านเลขที่ "{query}" ในระบบ กรุณาตรวจสอบเลขที่อีกครั้ง
                                </div>
                            )}
                            {searchResult && (
                                <div className="mt-4 bg-apple-card rounded-2xl p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div className="grid grid-cols-2 gap-x-4 sm:gap-x-8 gap-y-1 text-sm">
                                        <span className="text-apple-secondary">บ้านเลขที่</span>
                                        <span className="font-semibold text-apple-text">{searchResult.house}</span>
                                        <span className="text-apple-secondary">สถานะการชำระ</span>
                                        <span
                                            className="font-semibold px-2.5 py-0.5 rounded-full text-white text-xs w-fit"
                                            style={{ backgroundColor: searchResult.status === 'จ่ายแล้ว' ? PAID_COLOR : UNPAID_COLOR }}
                                        >
                                            {searchResult.status}
                                        </span>
                                    </div>
                                    <button
                                        onClick={() => setPopupResult(searchResult)}
                                        className="bg-white border border-apple-divider hover:bg-white/60 px-5 py-2 rounded-full text-sm font-medium transition-colors shrink-0"
                                    >
                                        ดูรายละเอียด
                                    </button>
                                </div>
                            )}
                            <p className="text-xs text-apple-secondary text-center mt-3">
                                * อัพเดตล่าสุด ถึง 21 ก.ค. 2569
                            </p>
                        </div>

                        {/* Summary cards */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16">
                            {summaryCards.map((c) => (
                                <div key={c.label} className="bg-white border border-apple-divider rounded-2xl p-5 text-center">
                                    <p className="text-xs sm:text-sm text-apple-secondary mb-1">{c.label}</p>
                                    <p className="text-xl sm:text-2xl font-semibold" style={{ color: c.color }}>{c.value}</p>
                                </div>
                            ))}
                        </div>

                        {/* Pie chart + legend */}
                        <div className="grid md:grid-cols-2 gap-10 items-center">
                            <PieChart
                                onSliceClick={(status) => setDrawerStatus(status)}
                                onSliceHover={setHovered}
                                hovered={hovered}
                            />
                            <div className="space-y-3">
                                {[
                                    { key: 'จ่ายแล้ว', count: paidHouses.length, pct: paidPct, color: PAID_COLOR },
                                    { key: 'ยังไม่ได้จ่าย', count: unpaidHouses.length, pct: unpaidPct, color: UNPAID_COLOR }
                                ].map((s) => (
                                    <button
                                        key={s.key}
                                        onClick={() => setDrawerStatus(s.key)}
                                        onMouseEnter={() => setHovered(s.key)}
                                        onMouseLeave={() => setHovered(null)}
                                        className={`w-full text-left rounded-2xl p-5 flex items-center justify-between transition-colors ${hovered === s.key ? 'bg-apple-card' : 'bg-white hover:bg-apple-card/60'} border border-apple-divider`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <span className="w-3.5 h-3.5 rounded-full shrink-0" style={{ backgroundColor: s.color }}></span>
                                            <span className="text-sm font-medium text-apple-text">{s.key}</span>
                                        </div>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-lg font-semibold" style={{ color: s.color }}>{s.count}</span>
                                            <span className="text-xs text-apple-secondary">หลัง ({formatPct(s.pct)})</span>
                                        </div>
                                    </button>
                                ))}
                                <p className="text-xs text-apple-secondary pt-2">
                                    รวมทั้งหมด {paymentTotal} หลัง • แตะที่กราฟหรือรายการเพื่อดูรายชื่อบ้านเลขที่ทั้งหมด (ค้นหา/เรียงลำดับ/แบ่งหน้าได้)
                                </p>
                            </div>
                        </div>
                    </div>

                    <PaymentPopup result={popupResult} onClose={() => setPopupResult(null)} />
                    <HouseListDrawer status={drawerStatus} onClose={() => setDrawerStatus(null)} />
                </section>
            );
        };

        // Crisis Management Section (Grid layout like Mac Accessories)
        const CrisisSection = () => (
            <section id="crisis" className="py-24 bg-[#f5f5f7]">
                <div className="max-w-[1024px] mx-auto px-6">
                    <div className="text-center mb-16">
                        <h2 className="typography-h2 mb-4">การแก้ปัญหาเฉพาะหน้า.</h2>
                        <p className="typography-body text-apple-secondary max-w-2xl mx-auto">
                            ระหว่างรอการเข้าถึงบัญชีธนาคาร (ช่วงสุญญากาศทางการเงิน) คณะกรรมการได้ดำเนินการแก้ไขปัญหาเร่งด่วนเพื่อไม่ให้กระทบต่อคุณภาพชีวิตของลูกบ้าน
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {crisisData.map((item, idx) => (
                            <div key={idx} className={`${item.color} rounded-[28px] p-8 md:p-10 ${item.isLarge ? 'md:col-span-2' : ''} apple-card-hover`}>
                                <h3 className="typography-h3 mb-4">{item.title}</h3>
                                <p className="typography-body text-apple-secondary mb-8">{item.desc}</p>

                                <div className="space-y-4">
                                    {item.pros && (
                                        <div className="flex gap-3 items-start">
                                            <Icon name="check" className="w-5 h-5 text-apple-green shrink-0 mt-0.5" />
                                            <div>
                                                <span className="text-sm font-semibold text-apple-text block">ผลดีที่จะได้รับ</span>
                                                <span className="text-sm text-apple-secondary">{item.pros}</span>
                                            </div>
                                        </div>
                                    )}
                                    {item.cons && (
                                        <div className="flex gap-3 items-start">
                                            <Icon name="alert" className="w-5 h-5 text-apple-orange shrink-0 mt-0.5" />
                                            <div>
                                                <span className="text-sm font-semibold text-apple-text block">ข้อควรระวัง / ความเสี่ยง</span>
                                                <span className="text-sm text-apple-secondary">{item.cons}</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        // Roadmap Section (Stacked wide cards)
        const RoadmapSection = () => (
            <section id="roadmap" className="py-24 bg-white">
                <div className="max-w-[1024px] mx-auto px-6">
                    <div className="text-center mb-16">
                        <h2 className="typography-h2 mb-4">แผนงานครึ่งปีหลัง 2026.</h2>
                        <p className="typography-body text-apple-secondary max-w-2xl mx-auto">
                            วิสัยทัศน์และทิศทางการดำเนินงานเพื่อการพัฒนาที่ยั่งยืน พร้อมการประเมินความเสี่ยงอย่างรอบด้าน
                        </p>
                    </div>

                    <div className="space-y-6">
                        {roadmapData.map((plan, idx) => (
                            <div key={idx} className="bg-apple-card rounded-[28px] p-8 md:p-12 apple-card-hover shadow-sm">
                                <div className="md:flex justify-between items-start gap-8 mb-8">
                                    <div className="mb-4 md:mb-0">
                                        <h3 className="typography-h3 mb-2">{plan.title}</h3>
                                        <p className="text-apple-blue font-medium">{plan.subtitle}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-6 border-t border-apple-divider">
                                    <div>
                                        <div className="text-apple-green font-semibold mb-2 flex items-center gap-2">
                                            <Icon name="check" className="w-5 h-5" /> ข้อดี
                                        </div>
                                        <p className="text-sm text-apple-secondary leading-relaxed">{plan.pros}</p>
                                    </div>
                                    <div>
                                        <div className="text-apple-orange font-semibold mb-2 flex items-center gap-2">
                                            <Icon name="alert" className="w-5 h-5" /> ข้อพิจารณา / ความเสี่ยง
                                        </div>
                                        <p className="text-sm text-apple-secondary leading-relaxed">{plan.cons}</p>
                                    </div>
                                </div>
                                {idx === 0 && <SupplierComparison />}
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        // Team Section — introduces the village committee at the bottom of the page
        const TeamSection = () => (
            <section id="team" className="py-24 bg-[#f5f5f7]">
                <div className="max-w-[900px] mx-auto px-6 text-center">
                    <div className="w-14 h-14 rounded-full bg-white flex items-center justify-center mx-auto mb-5 text-apple-blue shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-7 h-7">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                        </svg>
                    </div>
                    <h2 className="typography-h2 mb-4">ทีมงานนิติบุคคล</h2>
                    <p className="typography-body text-apple-secondary max-w-2xl mx-auto mb-12">
                        คณะกรรมการนิติบุคคลหมู่บ้าน สีวลี ชุดปัจจุบัน ทำงานร่วมมือกันด้วยใจอาสา เพื่อดูแลหมู่บ้านของเราให้น่าอยู่ยิ่งขึ้น
                    </p>
                    <div className="team-photo-card bg-white rounded-[28px] p-3 sm:p-4 shadow-sm inline-block max-w-full">
                        <img
                            src="https://lh3.googleusercontent.com/d/1Up5VAcsJAOBPop8B-2IVSl0MeUgjWHHU"
                            onError={(e) => {
                                if (e.target.dataset.fallback !== '1') {
                                    e.target.dataset.fallback = '1';
                                    e.target.src = './team-photo.jpg';
                                }
                            }}
                            alt="ทีมงานนิติบุคคลหมู่บ้าน สีวลี — Meet the Team"
                            className="rounded-[20px] w-full h-auto max-w-[800px] mx-auto block"
                        />
                    </div>
                </div>
            </section>
        );


        const InAppBrowserBanner = () => {
            const [isLine, setIsLine] = useState(false);
            useEffect(() => {
                const ua = (navigator.userAgent || '').toLowerCase();
                setIsLine(ua.indexOf('line') !== -1);
            }, []);
            if (!isLine) return null;
            const openInBrowser = () => {
                const url = window.location.href;
                const sep = url.includes('?') ? '&' : '?';
                window.location.href = url + sep + 'openExternalBrowser=1';
            };
            return (
                <div className="bg-[#06C755] text-white text-xs sm:text-sm text-center py-2.5 px-4 flex items-center justify-center gap-3 flex-wrap">
                    <span>คุณกำลังเปิดหน้านี้ผ่านแอป LINE — บางฟังก์ชันอาจทำงานไม่เต็มที่</span>
                    <button onClick={openInBrowser} className="underline font-semibold shrink-0">
                        เปิดในเบราว์เซอร์ &gt;
                    </button>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen">
                    <InAppBrowserBanner />
                    <Ribbon />
                    <ChapterNav />

                    <main>
                        {/* Hero Section */}
                        <section className="pt-24 pb-16 px-6 text-center max-w-[1024px] mx-auto">
                            <h1 className="typography-hero mb-6">
                                สรุปการดำเนินงาน<br/>
                                และงบประมาณบริหาร
                            </h1>
                            <p className="typography-body max-w-3xl mx-auto mt-4 text-apple-text text-lg md:text-xl">
                                รายงานฉบับนี้จัดทำขึ้นเพื่อสื่อสารการดำเนินงานของคณะกรรมการชุดใหม่ ชี้แจงการแก้ปัญหาในช่วงรอยต่อ
                                และกำหนดแผนงานอนาคตบนพื้นฐานของความเป็นจริง
                            </p>
                        </section>

                        <TimelineSection />
                        <BudgetSection />
                        <PaymentStatusSection />
                        <CrisisSection />
                        <RoadmapSection />
                        <TeamSection />
                    </main>

                    {/* Footer */}
                    <footer className="bg-white py-12 border-t border-apple-divider text-center">
                        <div className="max-w-[1024px] mx-auto px-6 text-xs text-apple-secondary space-y-2">
                            <p>จัดทำโดย คณะกรรมการหมู่บ้านชุดใหม่ • ข้อมูลอัปเดต ณ เดือนกรกฎาคม 2026</p>
                            <p>เอกสารฉบับนี้ใช้สำหรับการสื่อสารภายในหมู่บ้านเท่านั้น เพื่อความเข้าใจตรงกันและโปร่งใสในการบริหารงาน</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
